apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: educenter-os
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bibhuxsharmaa/educenter-os.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: educenter-os
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
