services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educenter-backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: educenter
      POSTGRES_USER: educenter_user
      POSTGRES_PASSWORD: educenter_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - postgres
    networks:
      - backend_net
      - database_net

  postgres:
    image: postgres:16
    container_name: educenter-postgres
    environment:
      POSTGRES_DB: educenter
      POSTGRES_USER: educenter_user
      POSTGRES_PASSWORD: educenter_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - database_net

networks:
  backend_net:
    driver: bridge

  database_net:
    driver: bridge

volumes:
  postgres_data: